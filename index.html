        document.addEventListener("DOMContentLoaded", () => {
            // Ambil data margin keuntungan secara dinamis dari localStorage
            const savedMarkup = parseFloat(localStorage.getItem('elvano_markup')) || 0;
            
            // Update harga tampilan secara dinamis sesuai margin keuntungan dari admin
            const priceElements = document.querySelectorAll('[data-base-price]');
            priceElements.forEach(el => {
                const basePrice = parseFloat(el.getAttribute('data-base-price'));
                const finalPrice = basePrice + (basePrice * (savedMarkup / 100));
